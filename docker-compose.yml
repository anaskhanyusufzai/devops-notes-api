
services:
  api:
    build: .
    container_name: notes-api
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: notes-db
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      POSTGRES_DB: notesdb
    ports:
      - "5432:5432"